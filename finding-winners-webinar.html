 bottom: 28px;
 width: min(280px, 74%);
 padding: 20px;
 border: 1px solid rgba(255, 255, 255, 0.15);
 background: rgba(16, 22, 29, 0.78);
 box-shadow: var(--shadow);
 backdrop-filter: blur(16px);
}
.credential-card span {
 color: rgba(247, 245, 239, 0.5);
 font-size: 11px;
 font-weight: 800;
 letter-spacing: 0.1em;
 text-transform: uppercase;
}
.credential-card strong {
 display: block;
 margin-top: 8px;
 color: var(--text);
 font-family: var(--serif);
 font-size: 1.45rem;
 line-height: 1.1;
}
.credential-card p {
 margin-top: 8px;
 color: rgba(247, 245, 239, 0.58);
 font-size: 13px;
}
.credential-grid {
 display: grid;
 grid-template-columns: repeat(2, minmax(0, 1fr));
 gap: 18px;
 margin-top: 44px;
}
.credential-grid div {
 padding: 26px;
 border: 1px solid rgba(255, 255, 255, 0.12);
 border-radius: var(--radius);
 background: rgba(255, 255, 255, 0.05);
}
.credential-grid strong {
 display: block;
 color: var(--text);
 font-size: 14px;
}
.credential-grid span {
 display: block;
 margin-top: 8px;
 color: rgba(247, 245, 239, 0.58);
 font-size: 13px;
 line-height: 1.55;
}
.comparison-grid {
 display: grid;
 grid-template-columns: repeat(2, minmax(0, 1fr));
 gap: 16px;
 margin-top: clamp(34px, 5vw, 64px);
}
.comparison-card {
 padding: clamp(26px, 4vw, 44px);
 border: 1px solid rgba(18, 24, 32, 0.12);
}
.comparison-card.muted {
 background: rgba(255, 255, 255, 0.36);
}
.comparison-card.premium {
 background: var(--ink);
 color: var(--text);
 box-shadow: 0 24px 70px rgba(18, 24, 32, 0.22);
}
.comparison-card h3 {
 font-family: var(--serif);
 font-size: clamp(1.5rem, 2.4vw, 2.2rem);
 line-height: 1.1;
}
.comparison-card ul {
 display: grid;
 gap: 14px;
 margin-top: 26px;
 list-style: none;
}
.comparison-card li {
 position: relative;
 padding-left: 28px;
 color: var(--dark-muted);
}
.comparison-card.premium li {
 color: rgba(247, 245, 239, 0.7);
}
.comparison-card li::before {
 content: "";
 position: absolute;
 top: 0.62em;
 left: 0;
 width: 10px;
 height: 10px;
 border: 1px solid #8b6c36;
 border-radius: 50%;
}
.comparison-card.premium li::before {
 background: var(--gold);
 border-color: var(--gold);
 box-shadow: 0 0 18px rgba(198, 163, 106, 0.46);
}
.cta-section {
 padding: clamp(56px, 8vw, 92px) 0;
}
.cta-layout {
 display: grid;
 grid-template-columns: minmax(0, 1fr) auto;
 gap: 28px;
 align-items: center;
 padding: clamp(30px, 5vw, 58px);
 border: 1px solid rgba(255, 255, 255, 0.13);
 border-radius: var(--radius);
 background:
 linear-gradient(135deg, rgba(198, 163, 106, 0.12), transparent 46%),
 rgba(255, 255, 255, 0.045);
}
.cta-layout h2 {
 max-width: 780px;
}
.cta-layout p {
 max-width: 680px;
 margin-top: 18px;
}
.site-footer {
 padding: 36px 0;
 border-top: 1px solid rgba(255, 255, 255, 0.1);
 background: #07090c;
}
.footer-stack {
 display: grid;
 gap: 22px;
}
.footer-inner {
 display: flex;
 align-items: center;
 justify-content: space-between;
 gap: 28px;
}
.footer-inner img {
 width: 210px;
 height: auto;
}
.footer-inner p {
 margin-top: 10px;
 color: rgba(247, 245, 239, 0.46);
 font-size: 13px;
}
.footer-links {
 display: flex;
 flex-wrap: wrap;
 gap: 18px;
 color: rgba(247, 245, 239, 0.62);
 font-size: 13px;
 font-weight: 700;
}
.footer-links a:hover {
 color: var(--text);
}
.footer-disclosure {
 max-width: 980px;
 padding-top: 18px;
 border-top: 1px solid rgba(255, 255, 255, 0.08);
 color: rgba(247, 245, 239, 0.36);
 font-size: 11px;
 line-height: 1.55;
}
.mobile-cta-bar {
 position: fixed;
 left: 0;
 right: 0;
 bottom: 0;
 z-index: 60;
 min-height: var(--mobile-cta-h);
 padding: 10px 0 max(10px, env(safe-area-inset-bottom));
 border-top: 1px solid rgba(255, 255, 255, 0.12);
 background: rgba(8, 11, 15, 0.9);
 backdrop-filter: blur(18px);
 -webkit-backdrop-filter: blur(18px);
 transform: translateY(110%);
 transition: transform 260ms var(--ease);
}
.mobile-cta-bar.is-visible {
 transform: translateY(0);
}
.mobile-cta-inner {
 display: flex;
 align-items: center;
 justify-content: space-between;
 gap: 14px;
}
.mobile-cta-inner span {
 display: block;
 color: rgba(247, 245, 239, 0.52);
 font-size: 11px;
 font-weight: 800;
 letter-spacing: 0.08em;
 text-transform: uppercase;
}
.mobile-cta-inner strong {
 display: block;
 color: var(--text);
 font-size: 13px;
}
body.modal-open {
 overflow: hidden;
}
.rsvp-modal {
 position: fixed;
 inset: 0;
 z-index: 120;
 display: grid;
 place-items: center;
 padding: clamp(18px, 4vw, 44px);
 opacity: 0;
 pointer-events: none;
 transition: opacity 220ms var(--ease);
}
.rsvp-modal[aria-hidden="false"] {
 opacity: 1;
 pointer-events: auto;
}
